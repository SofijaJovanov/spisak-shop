<body>
    <div id="root"><div class="p-4 max-w-md mx-auto pt-10"><h2 class="text-2xl font-black text-indigo-600 mb-6 text-center">PRVA PODEŠAVANJA</h2><div class="space-y-4"><div class="bg-white p-6 rounded-[2.5rem] shadow-sm border-2 border-indigo-50 space-y-4"><h2 class="font-black text-slate-800 uppercase italic tracking-tight">Konekcije</h2><div class="space-y-3"><div class="bg-slate-50 p-4 rounded-2xl"><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1">Supabase Key (sbKey)</label><input type="password" placeholder="Unesi svoj Supabase ključ ovde" class="w-full bg-transparent font-bold text-sm outline-none text-indigo-600" value="sb_publishable_EOE8WYsJE2JDkY5eYFgUEQ_BpDbsKDf"></div><hr class="border-slate-100"><div class="bg-slate-50 p-4 rounded-2xl"><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1">owner (GitHub)</label><input type="text" class="w-full bg-transparent font-bold text-sm outline-none" value="sofijajovanov"></div><div class="bg-slate-50 p-4 rounded-2xl"><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1">repo (GitHub)</label><input type="text" class="w-full bg-transparent font-bold text-sm outline-none" value="spisak-shop"></div><div class="bg-slate-50 p-4 rounded-2xl"><label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1">token (GitHub)</label><input type="password" class="w-full bg-transparent font-bold text-sm outline-none" value="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"></div></div></div><button class="w-full bg-indigo-600 text-white p-6 rounded-[2rem] font-black uppercase shadow-xl">💾 POTVRDI I NAZAD</button></div></div></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback, useMemo } = React;

        const SUPABASE_URL = "https://pmkiesljecprwfiedona.supabase.co";
        
        const getSupabase = () => {
            const key = localStorage.getItem('sb_key');
            if (!key || key.length < 10) return null;
            try { return supabase.createClient(SUPABASE_URL, key); } catch (e) { return null; }
        };

        const toBase64 = (str) => btoa(unescape(encodeURIComponent(str)));

        // --- KOMPONENTE ---

        const Modal = ({ isOpen, title, message, type, initialValue, options, onConfirm, onCancel }) => {
            const [val, setVal] = useState("");
            const [selectedOpt, setSelectedOpt] = useState("");

            useEffect(() => { 
                if (isOpen) {
                    if (initialValue && typeof initialValue === 'object') {
                        setVal(initialValue.name || "");
                        setSelectedOpt(initialValue.category || (options?.[0]?.name || ""));
                    } else {
                        setVal(initialValue || "");
                        setSelectedOpt(options?.[0]?.name || "");
                    }
                }
            }, [initialValue, isOpen, options]);

            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 modal-overlay">
                    <div className="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl">
                        <h3 className="text-xl font-black text-slate-800 mb-2 uppercase italic tracking-tighter">{title}</h3>
                        <p className="text-slate-500 font-bold text-sm mb-6 leading-tight">{message}</p>
                        
                        {type === 'prompt' && (
                            <input autoFocus className="w-full p-4 bg-slate-100 rounded-2xl mb-6 font-bold outline-none border-2 border-transparent focus:border-indigo-500" value={val} onChange={e => setVal(e.target.value)} />
                        )}

                        {type === 'article_prompt' && (
                            <div className="space-y-4 mb-6">
                                <input autoFocus placeholder="Naziv artikla" className="w-full p-4 bg-slate-100 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-indigo-500" value={val} onChange={e => setVal(e.target.value)} />
                                <select className="w-full p-4 bg-slate-100 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-indigo-500 appearance-none" value={selectedOpt} onChange={e => setSelectedOpt(e.target.value)}>
                                    <option value="">Bez kategorije</option>
                                    {options?.map(cat => <option key={cat.id} value={cat.name}>{cat.name}</option>)}
                                </select>
                            </div>
                        )}

                        <div className="flex gap-3">
                            <button className="flex-1 p-4 rounded-2xl font-black bg-slate-100 text-slate-500 uppercase text-xs" onClick={onCancel}>Otkaži</button>
                            <button className={`flex-1 p-4 rounded-2xl font-black uppercase text-xs text-white ${type === 'danger' ? 'bg-red-500' : 'bg-indigo-600'}`} 
                                onClick={() => onConfirm(type === 'article_prompt' ? { name: val, category: selectedOpt } : val)}>
                                Potvrdi
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const Container = ({ children, subtitle, onBack, loading, error, onLogout }) => (
            <div className="min-h-screen bg-slate-50 flex flex-col items-center pb-20">
                <header className="w-full max-w-md bg-indigo-600 p-6 text-white shadow-lg sticky top-0 z-[60] rounded-b-[2rem]">
                    <div className="flex items-center justify-between">
                        {onBack ? (
                            <button onClick={onBack} className="w-10 h-10 flex items-center justify-center bg-indigo-50 rounded-full font-bold active:scale-90 text-indigo-900">←</button>
                        ) : (
                            onLogout ? <button onClick={onLogout} className="text-[10px] font-black uppercase bg-indigo-700 px-3 py-2 rounded-xl active:scale-90">Izlaz</button> : <div className="w-10"></div>
                        )}
                        <div className="text-center">
                            <h1 className="text-xl font-black uppercase tracking-tighter">Spisak.shop</h1>
                            {subtitle && <p className="text-[10px] font-bold opacity-70 tracking-widest uppercase">{subtitle}</p>}
                        </div>
                        <div className="w-10"></div>
                    </div>
                    {loading && <div className="loader-line mt-4 rounded-full"></div>}
                </header>
                {error && <div className="w-full max-w-md p-4 mt-2"><div className="bg-red-100 border-2 border-red-200 text-red-700 p-3 rounded-xl text-xs font-bold text-center">⚠️ {error}</div></div>}
                <main className="w-full max-w-md p-4 space-y-4">{children}</main>
            </div>
        );

        const QtyControl = ({ qty, onChange }) => (
            <div className="flex items-center bg-slate-100 rounded-xl p-1 gap-1">
                <button className="w-8 h-8 flex items-center justify-center bg-white rounded-lg text-slate-800 font-black shadow-sm active:scale-90" onClick={(e) => { e.stopPropagation(); onChange(Math.max(1, qty - 1)); }}>-</button>
                <span className="w-8 text-center font-black text-slate-700 text-xs">{qty}</span>
                <button className="w-8 h-8 flex items-center justify-center bg-white rounded-lg text-slate-800 font-black shadow-sm active:scale-90" onClick={(e) => { e.stopPropagation(); onChange(qty + 1); }}>+</button>
            </div>
        );

        // --- PRIKAZI ---

        const LoginView = ({ onLogin, onOpenSettings }) => {
            const [mode, setMode] = useState("login");
            const [username, setUsername] = useState("");
            const [password, setPassword] = useState("");
            const [error, setError] = useState("");
            const [loading, setLoading] = useState(false);

            const handleAuth = async (e) => {
                e.preventDefault();
                const client = getSupabase();
                if (!client) { setError("Klikni na ⚙️ i podesi Supabase Key."); return; }
                
                setLoading(true); setError("");
                try {
                    if (mode === "register") {
                        const { data: existing } = await client.from('profiles').select('username').eq('username', username.trim()).maybeSingle();
                        if (existing) { setError("Korisničko ime je zauzeto."); setLoading(false); return; }
                        
                        const { error: regErr } = await client.from('profiles').insert([{ username: username.trim(), password: password.trim() }]);
                        if (regErr) throw regErr;
                        onLogin(username.trim());
                    } else {
                        const { data, error: loginErr } = await client.from('profiles').select('*').eq('username', username.trim()).eq('password', password.trim()).maybeSingle();
                        if (loginErr || !data) { setError("Pogrešno ime ili lozinka."); }
                        else { onLogin(username.trim()); }
                    }
                } catch (err) {
                    setError("Serverska greška ili ključ nije ispravan.");
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen bg-indigo-600 flex flex-col items-center justify-center p-8 text-white relative">
                    <button 
                        onClick={onOpenSettings}
                        className="absolute top-6 right-6 w-12 h-12 bg-white/10 rounded-full flex items-center justify-center text-xl hover:bg-white/20 transition-all active:scale-90"
                    >
                        ⚙️
                    </button>

                    <div className="bg-white p-8 rounded-[3rem] shadow-2xl w-full max-w-sm text-slate-900 animate-in zoom-in-95">
                        <h1 className="text-3xl font-black mb-2 text-center italic text-indigo-600 tracking-tighter">SPISAK.SHOP</h1>
                        <p className="text-[10px] font-black uppercase mb-8 text-center text-slate-400 tracking-widest">Verzija 1.1.3</p>
                        
                        <div className="flex mb-8 border-b-2 border-slate-100">
                            <button onClick={() => setMode("login")} className={`flex-1 pb-4 font-black uppercase text-xs tracking-widest ${mode === 'login' ? 'tab-active' : 'text-slate-300'}`}>Prijava</button>
                            <button onClick={() => setMode("register")} className={`flex-1 pb-4 font-black uppercase text-xs tracking-widest ${mode === 'register' ? 'tab-active' : 'text-slate-300'}`}>Novi Nalog</button>
                        </div>

                        <form onSubmit={handleAuth} className="space-y-4">
                            <div className="space-y-1">
                                <label className="text-[10px] font-black text-slate-400 uppercase ml-2">Username</label>
                                <input required className="w-full p-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-indigo-500 outline-none font-bold transition-all" value={username} onChange={e => setUsername(e.target.value)} />
                            </div>
                            <div className="space-y-1">
                                <label className="text-[10px] font-black text-slate-400 uppercase ml-2">Password</label>
                                <input required type="password" className="w-full p-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-indigo-500 outline-none font-bold transition-all" value={password} onChange={e => setPassword(e.target.value)} />
                            </div>
                            
                            {error && <p className="text-red-500 text-[10px] font-black text-center uppercase animate-pulse leading-tight">{error}</p>}
                            
                            <button disabled={loading} className="w-full bg-indigo-600 text-white p-5 rounded-2xl font-black uppercase shadow-xl active:scale-95 transition-all mt-4">
                                {loading ? "Provera..." : (mode === 'login' ? "Prijavi se" : "Kreiraj nalog")}
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        const SettingsView = ({ onRefresh, onBack }) => {
            const [status, setStatus] = useState("");
            const [loading, setLoading] = useState(false);
            const [config, setConfig] = useState({
                token: localStorage.getItem('gh_token') || "", 
                owner: localStorage.getItem('gh_owner') || "sofijajovanov",
                repo: localStorage.getItem('gh_repo') || "spisak-shop",
                sbKey: localStorage.getItem('sb_key') || "" 
            });

            const handleSave = async () => {
                const { token, owner, repo, sbKey } = config;
                localStorage.setItem('gh_token', token.trim());
                localStorage.setItem('gh_owner', owner.trim());
                localStorage.setItem('gh_repo', repo.trim());
                localStorage.setItem('sb_key', sbKey.trim());
                
                setLoading(true); setStatus("Čuvanje...");
                try {
                    if (onRefresh) onRefresh(); 
                    
                    if (token.length > 10) {
                        let htmlCode = document.documentElement.outerHTML;
                        const fullHTML = `<!DOCTYPE html>\n<html lang="sr">` + htmlCode;
                        const url = `https://api.github.com/repos/${owner.trim()}/${repo.trim()}/contents/index.html`;
                        const headers = { 'Authorization': `token ${token.trim()}`, 'Accept': 'application/vnd.github.v3+json' };
                        const checkRes = await fetch(url, { headers });
                        let sha = null;
                        if (checkRes.ok) { const fileData = await checkRes.json(); sha = fileData.sha; }
                        await fetch(url, {
                            method: 'PUT',
                            headers: { ...headers, 'Content-Type': 'application/json' },
                            body: JSON.stringify({ message: `Update_V1.1.3_${new Date().toLocaleString()}`, content: toBase64(fullHTML), sha: sha })
                        });
                        setStatus("✅ Sačuvano!");
                    } else {
                        setStatus("✅ Sačuvano lokalno!");
                    }
                    
                    setTimeout(() => onBack(), 1000);
                } catch (e) { setStatus("Greška pri čuvanju."); } finally { setLoading(false); }
            };

            return (
                <div className="space-y-4">
                    <div className="bg-white p-6 rounded-[2.5rem] shadow-sm border-2 border-indigo-50 space-y-4">
                        <h2 className="font-black text-slate-800 uppercase italic tracking-tight">Konekcije</h2>
                        <div className="space-y-3">
                            <div className="bg-slate-50 p-4 rounded-2xl">
                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1">Supabase Key (sbKey)</label>
                                <input type="password" placeholder="Unesi svoj Supabase ključ ovde" className="w-full bg-transparent font-bold text-sm outline-none text-indigo-600" value={config.sbKey} onChange={e => setConfig({...config, sbKey: e.target.value})} />
                            </div>
                            <hr className="border-slate-100" />
                            {['owner', 'repo', 'token'].map(key => (
                                <div key={key} className="bg-slate-50 p-4 rounded-2xl">
                                    <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1">{key} (GitHub)</label>
                                    <input type={key === 'token' ? "password" : "text"} className="w-full bg-transparent font-bold text-sm outline-none" value={config[key]} onChange={e => setConfig({...config, [key]: e.target.value})} />
                                </div>
                            ))}
                        </div>
                    </div>
                    <button disabled={loading} className="w-full bg-indigo-600 text-white p-6 rounded-[2rem] font-black uppercase shadow-xl" onClick={handleSave}>
                        {loading ? "Čuvanje..." : "💾 POTVRDI I NAZAD"}
                    </button>
                    {status && <div className="p-4 bg-white border-2 border-indigo-100 rounded-2xl text-center font-bold text-sm text-indigo-600 animate-bounce">{status}</div>}
                </div>
            );
        };

        const CreateView = ({ articles, onSave }) => {
            const [name, setName] = useState("Novi spisak");
            const [items, setItems] = useState([]);
            const [isPublic, setIsPublic] = useState(false);
            const [input, setInput] = useState("");
            const [showSug, setShowSug] = useState(false);

            const addItem = (n) => {
                const finalName = n || input.trim();
                if(!finalName) return;
                setItems(prev => {
                    const existingIdx = prev.findIndex(i => i.name.toLowerCase() === finalName.toLowerCase());
                    if (existingIdx > -1) {
                        const newItems = [...prev];
                        newItems[existingIdx].qty += 1;
                        return newItems;
                    }
                    return [...prev, { name: finalName, bought: false, qty: 1 }];
                });
                setInput(""); setShowSug(false);
            };

            return (
                <div className="space-y-4 animate-in fade-in duration-300">
                    <input className="w-full p-4 rounded-2xl bg-white font-extrabold outline-none shadow-sm text-indigo-600 text-lg border-2 border-transparent focus:border-indigo-100" value={name} onChange={e => setName(e.target.value)} />
                    
                    <div className="bg-white p-4 rounded-2xl flex items-center justify-between shadow-sm border border-indigo-50">
                        <span className="font-bold text-slate-700 text-sm uppercase italic">Dostupnost: {isPublic ? '🔓 JAVNI' : '🔒 PRIVATNI'}</span>
                        <button 
                            onClick={() => setIsPublic(!isPublic)}
                            className={`p-2 px-4 rounded-xl font-black text-[10px] uppercase transition-all ${isPublic ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-500'}`}
                        >
                            {isPublic ? 'Učini Privatnim' : 'Učini Javnim'}
                        </button>
                    </div>

                    <div className="relative">
                        <input className="w-full p-5 rounded-2xl bg-indigo-50 border-2 border-indigo-100 font-bold outline-none" placeholder="Šta kupujemo?" value={input} onChange={e => { setInput(e.target.value); setShowSug(true); }} />
                        {showSug && input && (
                            <div className="absolute w-full bg-white shadow-2xl rounded-2xl z-[100] mt-2 max-h-60 overflow-y-auto border border-indigo-50">
                                {articles.filter(a => a.name.toLowerCase().includes(input.toLowerCase())).map(a => (
                                    <div key={a.id} className="p-4 border-b font-bold active:bg-indigo-50 flex justify-between" onClick={() => addItem(a.name)}>
                                        <span>{a.name}</span> <span className="text-indigo-300">+</span>
                                    </div>
                                ))}
                                <div className="p-4 text-center text-indigo-600 font-black cursor-pointer bg-slate-50" onClick={() => addItem()}>+ DODAJ "{input}"</div>
                            </div>
                        )}
                    </div>
                    <div className="space-y-2">
                        {items.map((it, i) => (
                            <div key={i} className="p-4 bg-white rounded-2xl flex items-center gap-3 shadow-sm border border-slate-50">
                                <span className="flex-1 font-bold text-slate-700">{it.name}</span>
                                <QtyControl qty={it.qty} onChange={(q) => { const ni = [...items]; ni[i].qty = q; setItems(ni); }} />
                                <button className="text-red-300 w-8 h-8 flex items-center justify-center rounded-full active:bg-red-50" onClick={() => setItems(items.filter((_, idx) => idx !== i))}>✕</button>
                            </div>
                        ))}
                    </div>
                    <button className="w-full bg-indigo-600 text-white p-6 rounded-[2rem] font-black uppercase shadow-xl mt-4 active:scale-95 transition-all" onClick={() => onSave(name, items, isPublic)}>Sačuvaj Spisak</button>
                </div>
            );
        };

        const ListView = ({ list, articles, onUpdate, updateName, updateVisibility, openConfirm }) => {
            const [input, setInput] = useState("");
            const [showSug, setShowSug] = useState(false);

            const addItem = (n) => {
                const finalName = n || input.trim();
                if(!finalName) return;
                const currentItems = [...(list.items || [])];
                const existingIdx = currentItems.findIndex(i => i.name.toLowerCase() === finalName.toLowerCase());
                if (existingIdx > -1) {
                    currentItems[existingIdx].qty += 1;
                    onUpdate(currentItems);
                } else {
                    onUpdate([...currentItems, { name: finalName, bought: false, qty: 1 }]);
                }
                setInput(""); setShowSug(false);
            };

            if (!list) return null;

            return (
                <div className="space-y-4 animate-in fade-in duration-300">
                    <div className="flex flex-col items-center">
                        <div className="flex items-center justify-center gap-2 group cursor-pointer" onClick={() => openConfirm("Promeni naziv", "Unesi novi naziv spiska:", (n) => updateName(n), "prompt", list.name)}>
                            <h2 className="text-3xl font-black text-slate-800 text-center uppercase tracking-tighter italic mt-4 border-b-2 border-transparent group-hover:border-indigo-300">{list.name}</h2>
                            <span className="text-indigo-300 opacity-0 group-hover:opacity-100 transition-opacity">✎</span>
                        </div>
                        <div className="mt-1">
                             <button 
                                onClick={() => updateVisibility(!list.is_public)}
                                className={`text-[10px] font-black px-4 py-1 rounded-full uppercase tracking-widest ${list.is_public ? 'bg-indigo-100 text-indigo-600' : 'bg-slate-200 text-slate-500'}`}
                             >
                                {list.is_public ? '🔓 JAVAN (svi vide)' : '🔒 PRIVATAN (samo ja)'}
                             </button>
                        </div>
                    </div>
                    <div className="relative">
                        <input className="w-full p-5 rounded-2xl bg-white border-2 border-indigo-100 font-bold outline-none shadow-sm" placeholder="Dodaj na spisak..." value={input} onChange={e => { setInput(e.target.value); setShowSug(true); }} />
                        {showSug && input && (
                            <div className="absolute w-full bg-white shadow-2xl rounded-2xl z-[100] mt-2 max-h-60 overflow-y-auto border border-indigo-50">
                                {articles.filter(a => a.name.toLowerCase().includes(input.toLowerCase())).map(a => (
                                    <div key={a.id} className="p-4 border-b font-bold" onClick={() => addItem(a.name)}>{a.name}</div>
                                ))}
                                <div className="p-4 text-center text-indigo-600 font-black" onClick={() => addItem()}>+ DODAJ "{input}"</div>
                            </div>
                        )}
                    </div>
                    <div className="space-y-3">
                        {(list.items || []).map((it, i) => (
                            <div key={i} className={`p-5 rounded-[1.5rem] flex items-center gap-3 transition-all duration-300 ${it.bought ? 'bg-slate-100/70 opacity-60 grayscale' : 'bg-white shadow-sm border border-indigo-50'}`} onClick={() => {
                                const ni = [...list.items]; ni[i].bought = !ni[i].bought; onUpdate(ni);
                            }}>
                                <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center transition-all ${it.bought ? 'bg-green-500 border-green-500' : 'border-slate-200'}`}>
                                    {it.bought && <span className="text-white text-xs">✓</span>}
                                </div>
                                <span className={`flex-1 font-extrabold text-slate-700 ${it.bought ? 'strikethrough' : ''}`}>{it.name} {it.qty > 1 && `(x${it.qty})`}</span>
                                {!it.bought && <QtyControl qty={it.qty || 1} onChange={(q) => {
                                    const ni = [...list.items]; ni[i].qty = q; onUpdate(ni);
                                }} />}
                                <button className="text-red-200 p-2 ml-2" onClick={(e) => {
                                    e.stopPropagation();
                                    openConfirm("Ukloni", "Ukloniti sa spiska?", () => onUpdate(list.items.filter((_, idx) => idx !== i)));
                                }}>✕</button>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const ArticlesView = ({ articles, categories, fetchData, openConfirm }) => {
            const [selectedCat, setSelectedCat] = useState(categories[0]?.name || "");
            const [newName, setNewName] = useState("");

            const filteredArticles = useMemo(() => {
                return articles.filter(a => a.category_name === selectedCat);
            }, [articles, selectedCat]);

            const handleAdd = async () => {
                if (!newName.trim() || !selectedCat) return;
                const client = getSupabase();
                if (client) {
                    await client.from('articles').insert([{ name: newName.trim(), category_name: selectedCat }]);
                    setNewName("");
                    fetchData();
                }
            };

            return (
                <div className="space-y-4">
                    <div className="bg-white p-6 rounded-[2.5rem] shadow-sm border-2 border-indigo-50 space-y-4">
                        <h2 className="font-black text-slate-800 uppercase italic tracking-tight mb-2 text-center">Baza Artikala</h2>
                        <div className="space-y-3">
                            <select className="w-full p-4 bg-slate-100 rounded-2xl font-bold outline-none appearance-none" value={selectedCat} onChange={e => setSelectedCat(e.target.value)}>
                                <option value="">Sve kategorije</option>
                                {categories.map(c => <option key={c.id} value={c.name}>{c.name}</option>)}
                            </select>
                            <div className="flex gap-2">
                                <input className="flex-1 p-4 bg-indigo-50 rounded-2xl font-bold outline-none" placeholder="Novi artikal..." value={newName} onChange={e => setNewName(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleAdd()} />
                                <button onClick={handleAdd} className="bg-indigo-600 text-white p-4 rounded-2xl font-black uppercase text-xs px-6">Dodaj</button>
                            </div>
                        </div>
                    </div>
                    <div className="space-y-2">
                        {filteredArticles.map(a => (
                            <div key={a.id} className="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm border border-slate-50">
                                <span className="font-bold text-slate-700">{a.name}</span>
                                <div className="flex gap-2">
                                    <button className="action-btn bg-indigo-50 text-indigo-400 border-indigo-50" onClick={() => openConfirm("Izmeni Artikal", "Novi naziv:", async (data) => { if(data.name.trim() && getSupabase()) { await getSupabase().from('articles').update({ name: data.name.trim(), category_name: data.category }).eq('id', a.id); fetchData(); } }, "article_prompt", { name: a.name, category: a.category_name }, categories)}>✎</button>
                                    <button className="action-btn bg-red-50 text-red-400 border-red-50" onClick={() => openConfirm("Obriši", "Obrisati artikal?", async () => { if(getSupabase()) { await getSupabase().from('articles').delete().eq('id', a.id); fetchData(); } })}>✕</button>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // --- APP ---

        const App = () => {
            const [user, setUser] = useState(localStorage.getItem('user_name'));
            const [view, setView] = useState("home");
            const [lists, setLists] = useState([]);
            const [articles, setArticles] = useState([]);
            const [categories, setCategories] = useState([]);
            const [isLoading, setIsLoading] = useState(false);
            const [activeListId, setActiveListId] = useState(null);
            const [modal, setModal] = useState({ isOpen: false, title: "", message: "", type: "confirm", onConfirm: null, initialValue: "", options: null });
            const [error, setError] = useState(null);

            const fetchData = useCallback(async () => {
                const client = getSupabase();
                if (!client) return;
                setIsLoading(true);
                try {
                    const [art, lst, cat] = await Promise.all([
                        client.from('articles').select('*').order('name'),
                        // Povlači i moje i sve javne spiskove
                        client.from('shopping_lists').select('*').or(`created_by.eq.${user},is_public.eq.true`).order('created_at', { ascending: false }),
                        client.from('categories').select('*').order('name')
                    ]);
                    setArticles(art.data || []);
                    setLists(lst.data || []);
                    setCategories(cat.data || []);
                } catch (err) { setError("Sinhronizacija nije uspela."); } finally { setIsLoading(false); }
            }, [user]);

            useEffect(() => { if (user) fetchData(); }, [fetchData, user]);

            const openConfirm = (title, message, onConfirm, type = "danger", initialValue = "", options = null) => {
                setModal({ isOpen: true, title, message, type, initialValue, options, onConfirm: (val) => { onConfirm(val); setModal(m => ({...m, isOpen: false})); } });
            };

            const togglePublic = async (listId, status) => {
                const client = getSupabase();
                if (client) {
                    await client.from('shopping_lists').update({ is_public: status }).eq('id', listId);
                    fetchData();
                }
            };

            if (!user && view === "preLoginSettings") {
                return (
                    <div className="p-4 max-w-md mx-auto pt-10">
                        <h2 className="text-2xl font-black text-indigo-600 mb-6 text-center">PRVA PODEŠAVANJA</h2>
                        <SettingsView onBack={() => setView("home")} />
                    </div>
                );
            }

            if (!user) return <LoginView onLogin={(u) => { localStorage.setItem('user_name', u); setUser(u); }} onOpenSettings={() => setView("preLoginSettings")} />;

            return (
                <>
                    <Modal isOpen={modal.isOpen} {...modal} onCancel={() => setModal(m => ({...m, isOpen: false}))} />
                    {view === "home" && (
                        <Container subtitle={`Korisnik: ${user}`} loading={isLoading} error={error} onLogout={() => { localStorage.removeItem('user_name'); setUser(null); }}>
                            <div className="grid grid-cols-1 gap-4 mt-6">
                                <button className="menu-btn bg-white border-indigo-100 text-indigo-600" onClick={() => setView("create")}>📝 NOVI SPISAK</button>
                                <button className="menu-btn bg-white border-indigo-100 text-indigo-600" onClick={() => setView("archive")}>📁 ARHIVA ({lists.length})</button>
                                <button className="menu-btn bg-white border-indigo-100 text-indigo-600" onClick={() => setView("articles")}>📦 BAZA ARTIKALA</button>
                                <button className="menu-btn bg-white border-indigo-100 text-indigo-600" onClick={() => setView("categories")}>🏷️ KATEGORIJE</button>
                                <div className="pt-8 border-t border-slate-200 mt-4">
                                    <button className="menu-btn bg-slate-900 !text-white border-slate-950" onClick={() => setView("settings")}>⚙️ PODEŠAVANJA</button>
                                </div>
                            </div>
                        </Container>
                    )}
                    {view === "settings" && <Container subtitle="Setup" onBack={() => setView("home")}><SettingsView onRefresh={fetchData} onBack={() => setView("home")} /></Container>}
                    {view === "create" && <Container subtitle="Planiranje" onBack={() => setView("home")}><CreateView articles={articles} onSave={async (name, items, isPublic) => { const client = getSupabase(); if(client) { await client.from('shopping_lists').insert([{ name, items, created_by: user, is_public: isPublic }]); fetchData(); setView("archive"); } }} /></Container>}
                    {view === "archive" && (
                        <Container subtitle="Moji Spiskovi" onBack={() => setView("home")}>
                            <div className="space-y-6">
                                {/* JAVNI SPISKOVI */}
                                <section>
                                    <h2 className="text-[10px] font-black uppercase text-indigo-400 ml-4 mb-2 tracking-widest">🌍 Javni Spiskovi</h2>
                                    <div className="space-y-3">
                                        {lists.filter(l => l.is_public).map(l => (
                                            <div key={l.id} className="bg-indigo-50/50 p-5 rounded-[2rem] flex items-center justify-between shadow-sm border border-indigo-100 active:scale-95 cursor-pointer" onClick={() => { setActiveListId(l.id); setView("viewList"); }}>
                                                <div className="flex-1 px-2">
                                                    <h3 className="font-extrabold text-slate-800 uppercase italic leading-none mb-1">{l.name}</h3>
                                                    <span className="text-[10px] text-indigo-400 font-black uppercase">Od: {l.created_by} • {l.items?.length || 0} stavki</span>
                                                </div>
                                                <div className="flex gap-2">
                                                    <button className="action-btn bg-white text-indigo-600 border-indigo-100" onClick={(e) => { e.stopPropagation(); togglePublic(l.id, false); }}>🔓</button>
                                                    <button className="action-btn bg-red-50 text-red-500 border-red-100" onClick={(e) => { e.stopPropagation(); openConfirm("Obriši", "Ovaj javni spisak biće obrisan svima!", async () => { if(getSupabase()) { await getSupabase().from('shopping_lists').delete().eq('id', l.id); fetchData(); } }); }}>✕</button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </section>

                                {/* MOJI PRIVATNI */}
                                <section>
                                    <h2 className="text-[10px] font-black uppercase text-slate-400 ml-4 mb-2 tracking-widest">🔒 Moji Privatni</h2>
                                    <div className="space-y-3">
                                        {lists.filter(l => !l.is_public && l.created_by === user).map(l => (
                                            <div key={l.id} className="bg-white p-5 rounded-[2rem] flex items-center justify-between shadow-sm border border-slate-100 active:scale-95 cursor-pointer" onClick={() => { setActiveListId(l.id); setView("viewList"); }}>
                                                <div className="flex-1 px-2">
                                                    <h3 className="font-extrabold text-slate-800 uppercase italic leading-none mb-1">{l.name}</h3>
                                                    <span className="text-[10px] text-slate-400 font-black uppercase">{new Date(l.created_at).toLocaleDateString('sr-RS')} • {l.items?.length || 0} stavki</span>
                                                </div>
                                                <div className="flex gap-2">
                                                    <button className="action-btn bg-slate-50 text-slate-400 border-slate-100" onClick={(e) => { e.stopPropagation(); togglePublic(l.id, true); }}>🔒</button>
                                                    <button className="action-btn bg-red-50 text-red-500 border-red-100" onClick={(e) => { e.stopPropagation(); openConfirm("Obriši", "Obrisati spisak?", async () => { if(getSupabase()) { await getSupabase().from('shopping_lists').delete().eq('id', l.id); fetchData(); } }); }}>✕</button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </section>
                            </div>
                        </Container>
                    )}
                    {view === "viewList" && activeListId && <Container subtitle="Spisak" onBack={() => setView("archive")}><ListView list={lists.find(l => l.id === activeListId)} articles={articles} onUpdate={async (items) => { if(getSupabase()) { await getSupabase().from('shopping_lists').update({ items }).eq('id', activeListId); fetchData(); } }} updateName={async (name) => { if(getSupabase()) { await getSupabase().from('shopping_lists').update({ name }).eq('id', activeListId); fetchData(); } }} updateVisibility={async (v) => { if(getSupabase()) { await getSupabase().from('shopping_lists').update({ is_public: v }).eq('id', activeListId); fetchData(); } }} openConfirm={openConfirm} /></Container>}
                    {view === "articles" && <Container subtitle="Artikli" onBack={() => setView("home")}><ArticlesView articles={articles} categories={categories} fetchData={fetchData} openConfirm={openConfirm} /></Container>}
                    {view === "categories" && (
                        <Container subtitle="Grupe" onBack={() => setView("home")}>
                             <button className="w-full bg-indigo-600 text-white p-5 rounded-3xl font-black uppercase text-sm mb-4" onClick={() => openConfirm("Nova Kategorija", "Unesi naziv:", async (n) => { if(n.trim() && getSupabase()) { await getSupabase().from('categories').insert([{ name: n.trim() }]); fetchData(); } }, "prompt")}>+ NOVA KATEGORIJA</button>
                            <div className="space-y-2">{categories.map(c => (
                                <div key={c.id} className="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm border border-slate-50">
                                    <span className="font-bold text-slate-700">{c.name}</span>
                                    <div className="flex gap-2">
                                        <button className="action-btn bg-indigo-50 text-indigo-400 border-indigo-50" onClick={() => openConfirm("Izmeni", "Novi naziv:", async (n) => { if(n.trim() && getSupabase()) { await getSupabase().from('categories').update({ name: n.trim() }).eq('id', c.id); fetchData(); } }, "prompt", c.name)}>✎</button>
                                        <button className="action-btn bg-red-50 text-red-400 border-red-50" onClick={() => openConfirm("Obriši", "Brisanje kategorije briše sve u njoj!", async () => { if(getSupabase()) { await getSupabase().from('categories').delete().eq('id', c.id); fetchData(); } })}>✕</button>
                                    </div>
                                </div>))}</div>
                        </Container>
                    )}
                </>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

</body></html>
