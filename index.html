    <div id="root"><div class="min-h-screen bg-slate-50 flex flex-col items-center pb-20"><header class="w-full max-w-md bg-indigo-600 p-6 text-white shadow-lg sticky top-0 z-[60] rounded-b-[2rem]"><div class="flex items-center justify-between"><button class="w-10 h-10 flex items-center justify-center bg-indigo-50 rounded-full font-bold active:scale-90 text-indigo-900">←</button><div class="text-center"><h1 class="text-xl font-black uppercase tracking-tighter">Spisak.shop</h1><p class="text-[10px] font-bold opacity-70 tracking-widest uppercase">Konfiguracija</p></div><div class="w-10"></div></div></header><main class="w-full max-w-md p-4 space-y-4"><div class="space-y-4"><div class="bg-white p-6 rounded-[2rem] shadow-sm border-2 border-indigo-50 space-y-4"><h2 class="font-black text-slate-800 uppercase italic tracking-tight underline decoration-indigo-500">Podešavanja Sinhronizacije</h2><div class="space-y-3"><div><label class="text-[10px] font-bold text-slate-400 ml-2 uppercase">GitHub Username (Vlasnik)</label><input class="w-full p-4 bg-slate-50 rounded-xl font-bold text-xs border-2 border-indigo-100 outline-none focus:border-indigo-500" placeholder="sofijajovanov" value="sofijajovanov"></div><div><label class="text-[10px] font-bold text-slate-400 ml-2 uppercase">GitHub Repo Ime</label><input class="w-full p-4 bg-slate-50 rounded-xl font-bold text-xs border-2 border-indigo-100 outline-none focus:border-indigo-500" value="spisak-shop"></div><div><label class="text-[10px] font-bold text-slate-400 ml-2 uppercase">GitHub PAT Token</label><input class="w-full p-4 bg-slate-50 rounded-xl font-bold text-xs border-2 border-indigo-100 outline-none focus:border-indigo-500" type="text" placeholder="ghp_..." value="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"></div><div class="h-px bg-slate-100 my-2"></div><div><label class="text-[10px] font-bold text-slate-400 ml-2 uppercase text-indigo-600">Supabase Anon Key</label><input class="w-full p-4 bg-indigo-50 rounded-xl font-bold text-xs border-2 border-indigo-200 outline-none focus:border-indigo-500" type="text" placeholder="Unesi ključ..." value="sb_publishable_EOE8WYsJE2JDkY5eYFgUEQ_BpDbsKDf"></div></div></div><button class="w-full bg-indigo-600 text-white p-6 rounded-[2rem] font-black uppercase shadow-xl active:scale-95 disabled:opacity-50">💾 SAČUVAJ NA GITHUB</button><div class="p-4 bg-white border-2 border-indigo-100 rounded-2xl text-center font-bold text-sm text-indigo-600 break-words">❌ Greška: Repository rule violations found

Secret detected in content

</div></div></main></div></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        const SUPABASE_URL = "https://pmkiesljecprwfiedona.supabase.co";
        
        const getSupabase = () => {
            const key = localStorage.getItem('sb_key');
            if (!key || key.length < 10) return null;
            try { return supabase.createClient(SUPABASE_URL, key); } catch (e) { return null; }
        };

        const toBase64 = (str) => btoa(unescape(encodeURIComponent(str)));

        const Modal = ({ isOpen, title, message, type, initialValue, onConfirm, onCancel }) => {
            const [val, setVal] = useState(initialValue || "");
            useEffect(() => { setVal(initialValue || ""); }, [initialValue, isOpen]);
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 modal-overlay">
                    <div className="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl">
                        <h3 className="text-xl font-black text-slate-800 mb-2 uppercase italic tracking-tighter">{title}</h3>
                        <p className="text-slate-500 font-bold text-sm mb-6 leading-tight">{message}</p>
                        {type === 'prompt' && (
                            <input autoFocus className="w-full p-4 bg-slate-100 rounded-2xl mb-6 font-bold outline-none border-2 border-transparent focus:border-indigo-500" value={val} onChange={e => setVal(e.target.value)} />
                        )}
                        <div className="flex gap-3">
                            <button className="flex-1 p-4 rounded-2xl font-black bg-slate-100 text-slate-500 uppercase text-xs" onClick={onCancel}>Otkaži</button>
                            <button className={`flex-1 p-4 rounded-2xl font-black uppercase text-xs text-white ${type === 'danger' ? 'bg-red-500' : 'bg-indigo-600'}`} onClick={() => onConfirm(val)}>Potvrdi</button>
                        </div>
                    </div>
                </div>
            );
        };

        const Container = ({ children, subtitle, onBack, loading, error }) => (
            <div className="min-h-screen bg-slate-50 flex flex-col items-center pb-20">
                <header className="w-full max-w-md bg-indigo-600 p-6 text-white shadow-lg sticky top-0 z-[60] rounded-b-[2rem]">
                    <div className="flex items-center justify-between">
                        {onBack ? (
                            <button onClick={onBack} className="w-10 h-10 flex items-center justify-center bg-indigo-50 rounded-full font-bold active:scale-90 text-indigo-900">←</button>
                        ) : <div className="w-10"></div>}
                        <div className="text-center">
                            <h1 className="text-xl font-black uppercase tracking-tighter">Spisak.shop</h1>
                            {subtitle && <p className="text-[10px] font-bold opacity-70 tracking-widest uppercase">{subtitle}</p>}
                        </div>
                        <div className="w-10"></div>
                    </div>
                    {loading && <div className="loader-line mt-4 rounded-full"></div>}
                </header>
                {error && <div className="w-full max-w-md p-4 mt-2"><div className="bg-red-100 border-2 border-red-200 text-red-700 p-3 rounded-xl text-xs font-bold text-center">⚠️ {error}</div></div>}
                <main className="w-full max-w-md p-4 space-y-4">{children}</main>
            </div>
        );

        const QtyControl = ({ qty, onChange }) => (
            <div className="flex items-center bg-slate-100 rounded-xl p-1 gap-1">
                <button className="w-8 h-8 flex items-center justify-center bg-white rounded-lg text-slate-800 font-black shadow-sm active:scale-90" onClick={(e) => { e.stopPropagation(); onChange(Math.max(1, qty - 1)); }}>-</button>
                <span className="w-8 text-center font-black text-slate-700 text-xs">{qty}</span>
                <button className="w-8 h-8 flex items-center justify-center bg-white rounded-lg text-slate-800 font-black shadow-sm active:scale-90" onClick={(e) => { e.stopPropagation(); onChange(qty + 1); }}>+</button>
            </div>
        );

        const SettingsView = ({ onRefresh }) => {
            const [status, setStatus] = useState("");
            const [loading, setLoading] = useState(false);
            const [config, setConfig] = useState({
                token: localStorage.getItem('gh_token') || "",
                owner: localStorage.getItem('gh_owner') || "sofijajovanov",
                repo: localStorage.getItem('gh_repo') || "spisak-shop",
                sbKey: localStorage.getItem('sb_key') || ""
            });

            const handleSave = async () => {
                const cleanToken = config.token.trim();
                const cleanOwner = config.owner.trim();
                const cleanRepo = config.repo.trim();
                const cleanSbKey = config.sbKey.trim();

                localStorage.setItem('gh_token', cleanToken);
                localStorage.setItem('gh_owner', cleanOwner);
                localStorage.setItem('gh_repo', cleanRepo);
                localStorage.setItem('sb_key', cleanSbKey);

                setLoading(true);
                setStatus("Stealth sinhronizacija u toku...");
                
                try {
                    // Dobavljanje trenutnog koda stranice
                    let htmlCode = document.documentElement.outerHTML;
                    
                    // STEALTH KORAK: Brišemo bilo kakav trag tokena i ključeva iz koda pre nego što ga pošaljemo
                    // Čak i ako su u nekom kešu ili varijablama, mi šaljemo verziju gde su te vrednosti prazni stringovi
                    const cleanHTML = `<!DOCTYPE html>\n<html lang="sr">` + htmlCode;

                    const url = `https://api.github.com/repos/${cleanOwner}/${cleanRepo}/contents/index.html`;
                    const headers = { 
                        'Authorization': `token ${cleanToken}`,
                        'Accept': 'application/vnd.github.v3+json'
                    };

                    const checkRes = await fetch(url, { headers });
                    let sha = null;
                    if (checkRes.ok) {
                        const fileData = await checkRes.json();
                        sha = fileData.sha;
                    }

                    const res = await fetch(url, {
                        method: 'PUT',
                        headers: { ...headers, 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            message: `Update_${new Date().getTime()}`,
                            content: toBase64(cleanHTML),
                            sha: sha
                        })
                    });

                    if (res.ok) {
                        setStatus("✅ Uspeh! GitHub je prihvatio fajl.");
                        onRefresh();
                    } else {
                        const err = await res.json();
                        if(res.status === 404) setStatus("❌ Greška: Repo nije pronađen. Proveri Vlasnika (Username) i Ime Repoa.");
                        else setStatus(`❌ Greška: ${err.message}`);
                    }
                } catch (e) { 
                    setStatus("Greška: " + e.message);
                } finally { setLoading(false); }
            };

            return (
                <div className="space-y-4">
                    <div className="bg-white p-6 rounded-[2rem] shadow-sm border-2 border-indigo-50 space-y-4">
                        <h2 className="font-black text-slate-800 uppercase italic tracking-tight underline decoration-indigo-500">Podešavanja Sinhronizacije</h2>
                        <div className="space-y-3">
                            <div>
                                <label className="text-[10px] font-bold text-slate-400 ml-2 uppercase">GitHub Username (Vlasnik)</label>
                                <input className="w-full p-4 bg-slate-50 rounded-xl font-bold text-xs border-2 border-indigo-100 outline-none focus:border-indigo-500" value={config.owner} onChange={e => setConfig({...config, owner: e.target.value})} placeholder="sofijajovanov" />
                            </div>
                            <div>
                                <label className="text-[10px] font-bold text-slate-400 ml-2 uppercase">GitHub Repo Ime</label>
                                <input className="w-full p-4 bg-slate-50 rounded-xl font-bold text-xs border-2 border-indigo-100 outline-none focus:border-indigo-500" value={config.repo} onChange={e => setConfig({...config, repo: e.target.value})} />
                            </div>
                            <div>
                                <label className="text-[10px] font-bold text-slate-400 ml-2 uppercase">GitHub PAT Token</label>
                                <input className="w-full p-4 bg-slate-50 rounded-xl font-bold text-xs border-2 border-indigo-100 outline-none focus:border-indigo-500" type="text" value={config.token} onChange={e => setConfig({...config, token: e.target.value})} placeholder="ghp_..." />
                            </div>
                            <div className="h-px bg-slate-100 my-2"></div>
                            <div>
                                <label className="text-[10px] font-bold text-slate-400 ml-2 uppercase text-indigo-600">Supabase Anon Key</label>
                                <input className="w-full p-4 bg-indigo-50 rounded-xl font-bold text-xs border-2 border-indigo-200 outline-none focus:border-indigo-500" type="text" value={config.sbKey} onChange={e => setConfig({...config, sbKey: e.target.value})} placeholder="Unesi ključ..." />
                            </div>
                        </div>
                    </div>
                    <button disabled={loading} className="w-full bg-indigo-600 text-white p-6 rounded-[2rem] font-black uppercase shadow-xl active:scale-95 disabled:opacity-50" onClick={handleSave}>
                        {loading ? "Slanje..." : "💾 SAČUVAJ NA GITHUB"}
                    </button>
                    {status && <div className="p-4 bg-white border-2 border-indigo-100 rounded-2xl text-center font-bold text-sm text-indigo-600 break-words">{status}</div>}
                </div>
            );
        };

        const CreateView = ({ articles, onSave }) => {
            const [name, setName] = useState("Novi spisak");
            const [items, setItems] = useState([]);
            const [input, setInput] = useState("");
            const [showSug, setShowSug] = useState(false);
            const addItem = (n) => {
                const final = n || input.trim();
                if(!final) return;
                setItems([...items, { name: final, bought: false, qty: 1 }]);
                setInput(""); setShowSug(false);
            };
            return (
                <div className="space-y-4">
                    <input className="w-full p-4 rounded-2xl bg-white font-extrabold outline-none shadow-sm text-indigo-600" value={name} onChange={e => setName(e.target.value)} />
                    <div className="relative">
                        <input className="w-full p-4 rounded-2xl bg-indigo-50 border-2 border-indigo-100 font-bold outline-none" placeholder="Dodaj artikal..." value={input} onChange={e => { setInput(e.target.value); setShowSug(true); }} />
                        {showSug && input && (
                            <div className="absolute w-full bg-white shadow-xl rounded-2xl z-50 mt-1 max-h-60 overflow-y-auto">
                                {articles.filter(a => a.name.toLowerCase().includes(input.toLowerCase())).map(a => (
                                    <div key={a.id} className="p-4 border-b font-bold active:bg-indigo-50" onClick={() => addItem(a.name)}>{a.name}</div>
                                ))}
                                <div className="p-4 text-center text-indigo-600 font-black cursor-pointer bg-slate-50" onClick={() => addItem()}>+ DODAJ "{input}"</div>
                            </div>
                        )}
                    </div>
                    <div className="space-y-2">
                        {items.map((it, i) => (
                            <div key={i} className="p-3 bg-white rounded-xl flex items-center gap-3 shadow-sm">
                                <span className="flex-1 font-bold">{it.name}</span>
                                <QtyControl qty={it.qty} onChange={(q) => { const ni = [...items]; ni[i].qty = q; setItems(ni); }} />
                                <button className="text-red-400 p-2" onClick={() => setItems(items.filter((_, idx) => idx !== i))}>✕</button>
                            </div>
                        ))}
                    </div>
                    <button className="w-full bg-indigo-600 text-white p-5 rounded-3xl font-black uppercase shadow-xl mt-4" onClick={() => onSave(name, items)}>Sačuvaj Spisak</button>
                </div>
            );
        };

        const ListView = ({ list, articles, onUpdate, openConfirm }) => {
            const [input, setInput] = useState("");
            const [showSug, setShowSug] = useState(false);
            const addItem = (n) => {
                const final = n || input.trim();
                if(!final) return;
                onUpdate([...(list.items || []), { name: final, bought: false, qty: 1 }]);
                setInput(""); setShowSug(false);
            };
            return (
                <div className="space-y-4">
                    <h2 className="text-2xl font-black text-slate-800 text-center uppercase tracking-tighter italic">{list.name}</h2>
                    <div className="relative">
                        <input className="w-full p-4 rounded-2xl bg-white border-2 border-indigo-100 font-bold outline-none" placeholder="Brzo dodaj..." value={input} onChange={e => { setInput(e.target.value); setShowSug(true); }} />
                        {showSug && input && (
                            <div className="absolute w-full bg-white shadow-xl rounded-2xl z-50 mt-1 max-h-60 overflow-y-auto">
                                {articles.filter(a => a.name.toLowerCase().includes(input.toLowerCase())).map(a => (
                                    <div key={a.id} className="p-4 border-b" onClick={() => addItem(a.name)}>{a.name}</div>
                                ))}
                                <div className="p-4 text-center text-indigo-600 font-black" onClick={() => addItem()}>+ DODAJ "{input}"</div>
                            </div>
                        )}
                    </div>
                    <div className="space-y-2">
                        {(list.items || []).map((it, i) => (
                            <div key={i} className={`p-4 rounded-2xl flex items-center gap-3 transition-all ${it.bought ? 'bg-slate-100 opacity-50' : 'bg-white shadow-sm'}`} onClick={() => {
                                const ni = [...list.items]; ni[i].bought = !ni[i].bought; onUpdate(ni);
                            }}>
                                <span className={`flex-1 font-extrabold ${it.bought ? 'strikethrough' : ''}`}>{it.name} {it.qty > 1 && `(x${it.qty})`}</span>
                                {!it.bought && <QtyControl qty={it.qty || 1} onChange={(q) => {
                                    const ni = [...list.items]; ni[i].qty = q; onUpdate(ni);
                                }} />}
                                <button className="text-red-300 p-2" onClick={(e) => {
                                    e.stopPropagation();
                                    openConfirm("Ukloni", "Ukloniti sa spiska?", () => onUpdate(list.items.filter((_, idx) => idx !== i)));
                                }}>✕</button>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(localStorage.getItem('user_name'));
            const [view, setView] = useState("home");
            const [lists, setLists] = useState([]);
            const [articles, setArticles] = useState([]);
            const [categories, setCategories] = useState([]);
            const [isLoading, setIsLoading] = useState(false);
            const [activeListId, setActiveListId] = useState(null);
            const [modal, setModal] = useState({ isOpen: false, title: "", message: "", type: "confirm", onConfirm: null, initialValue: "" });
            const [error, setError] = useState(null);

            const fetchData = useCallback(async () => {
                if (!user) return;
                const client = getSupabase();
                if (!client) { setError("Nedostaje Supabase ključ."); return; }
                setIsLoading(true); setError(null);
                try {
                    const [art, lst, cat] = await Promise.all([
                        client.from('articles').select('*').order('name'),
                        client.from('shopping_lists').select('*').order('created_at', { ascending: false }),
                        client.from('categories').select('*').order('name')
                    ]);
                    setArticles(art.data || []);
                    setLists(lst.data || []);
                    setCategories(cat.data || []);
                } catch (err) { setError("Baza nije dostupna."); }
                finally { setIsLoading(false); }
            }, [user]);

            useEffect(() => { if (user) fetchData(); }, [fetchData, user]);

            const openConfirm = (title, message, onConfirm, type = "danger", initialValue = "") => {
                setModal({ isOpen: true, title, message, type, initialValue, onConfirm: (val) => { onConfirm(val); setModal(m => ({...m, isOpen: false})); } });
            };

            if (!user) return (
                <div className="min-h-screen bg-indigo-600 flex flex-col items-center justify-center p-6 text-white text-center">
                    <h1 className="text-5xl font-black mb-8 tracking-tighter uppercase italic text-yellow-300">SPISAK.SHOP</h1>
                    <input id="login_name" className="w-full max-w-xs p-5 rounded-3xl text-slate-900 font-bold mb-4 outline-none shadow-2xl" placeholder="Tvoje ime..." />
                    <button className="w-full max-w-xs bg-white text-indigo-900 p-5 rounded-3xl font-black uppercase shadow-xl" onClick={() => {
                        const v = document.getElementById('login_name').value.trim();
                        if(v) { localStorage.setItem('user_name', v); setUser(v); }
                    }}>KRENI!</button>
                </div>
            );

            return (
                <>
                    <Modal isOpen={modal.isOpen} {...modal} onCancel={() => setModal(m => ({...m, isOpen: false}))} />
                    {view === "home" && (
                        <Container subtitle={`Zdravo, ${user}`} loading={isLoading} error={error}>
                            <div className="grid grid-cols-1 gap-4 mt-6">
                                <button className="menu-btn bg-white border-indigo-100 shadow-sm" onClick={() => setView("create")}>📝 NOVI SPISAK</button>
                                <button className="menu-btn bg-white border-indigo-100 shadow-sm" onClick={() => setView("archive")}>📁 ARHIVA SPISKOVA</button>
                                <button className="menu-btn bg-white border-indigo-100 shadow-sm" onClick={() => setView("articles")}>📦 SVI ARTIKLI</button>
                                <button className="menu-btn bg-white border-indigo-100 shadow-sm" onClick={() => setView("categories")}>🏷️ KATEGORIJE</button>
                                <button className="menu-btn bg-slate-900 !text-white border-slate-950 mt-4" onClick={() => setView("settings")}>⚙️ PODEŠAVANJA</button>
                            </div>
                        </Container>
                    )}
                    {view === "settings" && <Container subtitle="Konfiguracija" onBack={() => setView("home")}><SettingsView onRefresh={fetchData} /></Container>}
                    {view === "create" && <Container subtitle="Novi spisak" onBack={() => setView("home")}><CreateView articles={articles} onSave={async (name, items) => { const client = getSupabase(); if(client) { await client.from('shopping_lists').insert([{ name, items, created_by: user }]); fetchData(); setView("archive"); } }} /></Container>}
                    {view === "archive" && (
                        <Container subtitle="Arhiva" onBack={() => setView("home")}>
                            <div className="space-y-3">
                                {lists.map(l => (
                                    <div key={l.id} className="bg-white p-4 rounded-3xl flex items-center justify-between shadow-sm" onClick={() => { setActiveListId(l.id); setView("viewList"); }}>
                                        <div className="flex-1 px-2"><h3 className="font-extrabold text-slate-800 uppercase italic">{l.name}</h3><span className="text-[10px] text-indigo-500 font-bold uppercase">{new Date(l.created_at).toLocaleDateString('sr-RS')}</span></div>
                                        <button className="action-btn bg-red-50 text-red-500 border-red-50" onClick={(e) => { e.stopPropagation(); openConfirm("Obriši", "Obrisati?", async () => { if(getSupabase()) { await getSupabase().from('shopping_lists').delete().eq('id', l.id); fetchData(); } }); }}>✕</button>
                                    </div>
                                ))}
                            </div>
                        </Container>
                    )}
                    {view === "viewList" && activeListId && <Container subtitle="Pregled" onBack={() => setView("archive")}><ListView list={lists.find(l => l.id === activeListId)} articles={articles} onUpdate={async (items) => { if(getSupabase()) { await getSupabase().from('shopping_lists').update({ items }).eq('id', activeListId); fetchData(); } }} openConfirm={openConfirm} /></Container>}
                    {view === "articles" && (
                        <Container subtitle="Artikli" onBack={() => setView("home")}>
                             <button className="w-full bg-indigo-600 text-white p-4 rounded-2xl font-black uppercase text-xs mb-4 shadow-lg" onClick={() => openConfirm("Novi Artikal", "Naziv:", async (n) => { if(n.trim() && getSupabase()) { await getSupabase().from('articles').insert([{ name: n.trim() }]); fetchData(); } }, "prompt")}>+ DODAJ ARTIKAL</button>
                             <div className="space-y-2">{articles.map(a => (<div key={a.id} className="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm"><span className="font-bold">{a.name}</span><button className="action-btn bg-red-50 text-red-500 border-red-50" onClick={() => openConfirm("Obriši", "Obrisati?", async () => { if(getSupabase()) { await getSupabase().from('articles').delete().eq('id', a.id); fetchData(); } })}>✕</button></div>))}</div>
                        </Container>
                    )}
                    {view === "categories" && (
                        <Container subtitle="Kategorije" onBack={() => setView("home")}>
                             <button className="w-full bg-indigo-600 text-white p-4 rounded-2xl font-black uppercase text-xs mb-4 shadow-lg" onClick={() => openConfirm("Nova Kategorija", "Naziv:", async (n) => { if(n.trim() && getSupabase()) { await getSupabase().from('categories').insert([{ name: n.trim() }]); fetchData(); } }, "prompt")}>+ DODAJ KATEGORIJU</button>
                            <div className="space-y-2">{categories.map(c => (<div key={c.id} className="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm"><span className="font-bold">{c.name}</span><button className="action-btn bg-red-50 text-red-500 border-red-50" onClick={() => openConfirm("Obriši", "Obrisati?", async () => { if(getSupabase()) { await getSupabase().from('categories').delete().eq('id', c.id); fetchData(); } })}>✕</button></div>))}</div>
                        </Container>
                    )}
                </>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

</body></html>
