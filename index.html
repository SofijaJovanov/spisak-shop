                        )}
                        <div className="flex gap-3">
                            <button className="flex-1 p-4 rounded-2xl font-black bg-slate-100 text-slate-500 uppercase text-xs" onClick={onCancel}>Otkaži</button>
                            <button className={`flex-1 p-4 rounded-2xl font-black uppercase text-xs text-white ${type === 'danger' ? 'bg-red-500' : 'bg-indigo-600'}`} onClick={() => onConfirm(val)}>Potvrdi</button>
                        </div>
                    </div>
                </div>
            );
        };

        const Container = ({ children, subtitle, onBack, loading, error }) => (
            <div className="min-h-screen bg-slate-50 flex flex-col items-center pb-20">
                <header className="w-full max-w-md bg-indigo-600 p-6 text-white shadow-lg sticky top-0 z-[60] rounded-b-[2rem]">
                    <div className="flex items-center justify-between">
                        {onBack ? (
                            <button onClick={onBack} className="w-10 h-10 flex items-center justify-center bg-indigo-50 rounded-full font-bold active:scale-90 text-indigo-900">←</button>
                        ) : <div className="w-10"></div>}
                        <div className="text-center">
                            <h1 className="text-xl font-black uppercase tracking-tighter">Spisak.shop</h1>
                            {subtitle && <p className="text-[10px] font-bold opacity-70 tracking-widest uppercase">{subtitle}</p>}
                        </div>
                        <div className="w-10"></div>
                    </div>
                    {loading && <div className="loader-line mt-4 rounded-full"></div>}
                </header>
                {error && <div className="w-full max-w-md p-4 mt-2"><div className="bg-red-100 border-2 border-red-200 text-red-700 p-3 rounded-xl text-xs font-bold text-center">⚠️ {error}</div></div>}
                <main className="w-full max-w-md p-4 space-y-4">{children}</main>
            </div>
        );

        const QtyControl = ({ qty, onChange }) => (
            <div className="flex items-center bg-slate-100 rounded-xl p-1 gap-1">
                <button className="w-8 h-8 flex items-center justify-center bg-white rounded-lg text-slate-800 font-black shadow-sm active:scale-90" onClick={(e) => { e.stopPropagation(); onChange(Math.max(1, qty - 1)); }}>-</button>
                <span className="w-8 text-center font-black text-slate-700 text-xs">{qty}</span>
                <button className="w-8 h-8 flex items-center justify-center bg-white rounded-lg text-slate-800 font-black shadow-sm active:scale-90" onClick={(e) => { e.stopPropagation(); onChange(qty + 1); }}>+</button>
            </div>
        );

        const SettingsView = ({ onRefresh }) => {
            const [status, setStatus] = useState("");
            const [loading, setLoading] = useState(false);
            
            // Unesi podatke direktno ovde ako ne želiš da kucaš:
            const [config, setConfig] = useState({
                token: localStorage.getItem('gh_token') || "", 
                owner: localStorage.getItem('gh_owner') || "sofijajovanov",
                repo: localStorage.getItem('gh_repo') || "spisak-shop",
                sbKey: localStorage.getItem('sb_key') || "" 
            });

            const handleSave = async () => {
                const { token, owner, repo, sbKey } = config;
                
                localStorage.setItem('gh_token', token.trim());
                localStorage.setItem('gh_owner', owner.trim());
                localStorage.setItem('gh_repo', repo.trim());
                localStorage.setItem('sb_key', sbKey.trim());

                setLoading(true);
                setStatus("Pokušavam sinhronizaciju...");
                
                try {
                    let htmlCode = document.documentElement.outerHTML;
                    const fullHTML = `<!DOCTYPE html>\n<html lang="sr">` + htmlCode;

                    const url = `https://api.github.com/repos/${owner.trim()}/${repo.trim()}/contents/index.html`;
                    const headers = { 
                        'Authorization': `token ${token.trim()}`,
                        'Accept': 'application/vnd.github.v3+json'
                    };

                    const checkRes = await fetch(url, { headers });
                    let sha = null;
                    if (checkRes.ok) {
                        const fileData = await checkRes.json();
                        sha = fileData.sha;
                    }

                    const res = await fetch(url, {
                        method: 'PUT',
                        headers: { ...headers, 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            message: `Manual_Sync_${new Date().toLocaleString()}`,
                            content: toBase64(fullHTML),
                            sha: sha
                        })
                    });

                    if (res.ok) {
                        setStatus("✅ Sinhronizovano! Podaci će se pojaviti za trenutak.");
                        // Sačekaj sekundu da se memorija osveži pa povuci podatke iz baze
                        setTimeout(() => onRefresh(), 1000);
                    } else {
                        const err = await res.json();
                        setStatus(`❌ GitHub Greška: ${err.message}`);
                    }
                } catch (e) { 
                    setStatus("Greška: " + e.message);
                } finally { setLoading(false); }
            };

            return (
                <div className="space-y-4 animate-in fade-in slide-in-from-bottom-4 duration-300">
                    <div className="bg-white p-6 rounded-[2.5rem] shadow-sm border-2 border-indigo-50 space-y-4">
                        <h2 className="font-black text-slate-800 uppercase italic tracking-tight underline decoration-indigo-500">Podešavanja</h2>
                        <div className="space-y-3">
                            <div className="bg-slate-50 p-4 rounded-2xl border-2 border-transparent focus-within:border-indigo-500 transition-all">
                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1">GitHub Username</label>
                                <input className="w-full bg-transparent font-bold text-sm outline-none" value={config.owner} onChange={e => setConfig({...config, owner: e.target.value})} />
                            </div>
                            <div className="bg-slate-50 p-4 rounded-2xl border-2 border-transparent focus-within:border-indigo-500 transition-all">
                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1">Repo Ime</label>
                                <input className="w-full bg-transparent font-bold text-sm outline-none" value={config.repo} onChange={e => setConfig({...config, repo: e.target.value})} />
                            </div>
                            <div className="bg-indigo-50 p-4 rounded-2xl border-2 border-transparent focus-within:border-indigo-500 transition-all">
                                <label className="text-[10px] font-black text-indigo-400 uppercase tracking-widest block mb-1">GitHub Token (ghp_...)</label>
                                <input type="password" placeholder="Zalećeni token ovde" className="w-full bg-transparent font-bold text-sm outline-none text-indigo-700" value={config.token} onChange={e => setConfig({...config, token: e.target.value})} />
                            </div>
                            <div className="bg-indigo-50 p-4 rounded-2xl border-2 border-transparent focus-within:border-indigo-500 transition-all">
                                <label className="text-[10px] font-black text-indigo-400 uppercase tracking-widest block mb-1">Supabase Anon Key</label>
                                <input type="password" placeholder="Zalećeni ključ ovde" className="w-full bg-transparent font-bold text-sm outline-none text-indigo-700" value={config.sbKey} onChange={e => setConfig({...config, sbKey: e.target.value})} />
                            </div>
                        </div>
                    </div>
                    <button disabled={loading} className="w-full bg-indigo-600 text-white p-6 rounded-[2rem] font-black uppercase shadow-xl active:scale-95 disabled:opacity-50 transition-all" onClick={handleSave}>
                        {loading ? "Čuvanje..." : "💾 SAČUVAJ I OSVEŽI BAZU"}
                    </button>
                    {status && <div className="p-4 bg-white border-2 border-indigo-100 rounded-2xl text-center font-bold text-sm text-indigo-600">{status}</div>}
                </div>
            );
        };

        const CreateView = ({ articles, onSave }) => {
            const [name, setName] = useState("Novi spisak");
            const [items, setItems] = useState([]);
            const [input, setInput] = useState("");
            const [showSug, setShowSug] = useState(false);
            const addItem = (n) => {
                const final = n || input.trim();
                if(!final) return;
                setItems([...items, { name: final, bought: false, qty: 1 }]);
                setInput(""); setShowSug(false);
            };
            return (
                <div className="space-y-4 animate-in fade-in duration-300">
                    <input className="w-full p-4 rounded-2xl bg-white font-extrabold outline-none shadow-sm text-indigo-600 text-lg border-2 border-transparent focus:border-indigo-100" value={name} onChange={e => setName(e.target.value)} />
                    <div className="relative">
                        <input className="w-full p-5 rounded-2xl bg-indigo-50 border-2 border-indigo-100 font-bold outline-none placeholder-indigo-300" placeholder="Šta kupujemo?" value={input} onChange={e => { setInput(e.target.value); setShowSug(true); }} />
                        {showSug && input && (
                            <div className="absolute w-full bg-white shadow-2xl rounded-2xl z-[100] mt-2 max-h-60 overflow-y-auto border border-indigo-50">
                                {articles.filter(a => a.name.toLowerCase().includes(input.toLowerCase())).map(a => (
                                    <div key={a.id} className="p-4 border-b font-bold active:bg-indigo-50 flex justify-between" onClick={() => addItem(a.name)}>
                                        <span>{a.name}</span>
                                        <span className="text-indigo-300">+</span>
                                    </div>
                                ))}
                                <div className="p-4 text-center text-indigo-600 font-black cursor-pointer bg-slate-50" onClick={() => addItem()}>+ DODAJ "{input}"</div>
                            </div>
                        )}
                    </div>
                    <div className="space-y-2">
                        {items.map((it, i) => (
                            <div key={i} className="p-4 bg-white rounded-2xl flex items-center gap-3 shadow-sm border border-slate-50">
                                <span className="flex-1 font-bold text-slate-700">{it.name}</span>
                                <QtyControl qty={it.qty} onChange={(q) => { const ni = [...items]; ni[i].qty = q; setItems(ni); }} />
                                <button className="text-red-300 w-8 h-8 flex items-center justify-center rounded-full active:bg-red-50" onClick={() => setItems(items.filter((_, idx) => idx !== i))}>✕</button>
                            </div>
                        ))}
                    </div>
                    <button className="w-full bg-indigo-600 text-white p-6 rounded-[2rem] font-black uppercase shadow-xl mt-4 active:scale-95 transition-all" onClick={() => onSave(name, items)}>Sačuvaj Spisak</button>
                </div>
            );
        };

        const ListView = ({ list, articles, onUpdate, openConfirm }) => {
            const [input, setInput] = useState("");
            const [showSug, setShowSug] = useState(false);
            const addItem = (n) => {
                const final = n || input.trim();
                if(!final) return;
                onUpdate([...(list.items || []), { name: final, bought: false, qty: 1 }]);
                setInput(""); setShowSug(false);
            };
            return (
                <div className="space-y-4 animate-in fade-in duration-300">
                    <h2 className="text-3xl font-black text-slate-800 text-center uppercase tracking-tighter italic my-4">{list.name}</h2>
                    <div className="relative">
                        <input className="w-full p-5 rounded-2xl bg-white border-2 border-indigo-100 font-bold outline-none shadow-sm" placeholder="Dodaj na spisak..." value={input} onChange={e => { setInput(e.target.value); setShowSug(true); }} />
                        {showSug && input && (
                            <div className="absolute w-full bg-white shadow-2xl rounded-2xl z-[100] mt-2 max-h-60 overflow-y-auto border border-indigo-50">
                                {articles.filter(a => a.name.toLowerCase().includes(input.toLowerCase())).map(a => (
                                    <div key={a.id} className="p-4 border-b font-bold" onClick={() => addItem(a.name)}>{a.name}</div>
                                ))}
                                <div className="p-4 text-center text-indigo-600 font-black" onClick={() => addItem()}>+ DODAJ "{input}"</div>
                            </div>
                        )}
                    </div>
                    <div className="space-y-3">
                        {(list.items || []).map((it, i) => (
                            <div key={i} className={`p-5 rounded-[1.5rem] flex items-center gap-3 transition-all duration-300 ${it.bought ? 'bg-slate-100/70 opacity-60 grayscale' : 'bg-white shadow-sm border border-indigo-50'}`} onClick={() => {
                                const ni = [...list.items]; ni[i].bought = !ni[i].bought; onUpdate(ni);
                            }}>
                                <div className={`w-6 h-6 rounded-full border-2 flex items-center justify-center transition-all ${it.bought ? 'bg-green-500 border-green-500' : 'border-slate-200'}`}>
                                    {it.bought && <span className="text-white text-xs">✓</span>}
                                </div>
                                <span className={`flex-1 font-extrabold text-slate-700 ${it.bought ? 'strikethrough' : ''}`}>{it.name} {it.qty > 1 && `(x${it.qty})`}</span>
                                {!it.bought && <QtyControl qty={it.qty || 1} onChange={(q) => {
                                    const ni = [...list.items]; ni[i].qty = q; onUpdate(ni);
                                }} />}
                                <button className="text-red-200 p-2 ml-2" onClick={(e) => {
                                    e.stopPropagation();
                                    openConfirm("Ukloni", "Ukloniti sa spiska?", () => onUpdate(list.items.filter((_, idx) => idx !== i)));
                                }}>✕</button>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useState(localStorage.getItem('user_name'));
            const [view, setView] = useState("home");
            const [lists, setLists] = useState([]);
            const [articles, setArticles] = useState([]);
            const [categories, setCategories] = useState([]);
            const [isLoading, setIsLoading] = useState(false);
            const [activeListId, setActiveListId] = useState(null);
            const [modal, setModal] = useState({ isOpen: false, title: "", message: "", type: "confirm", onConfirm: null, initialValue: "" });
            const [error, setError] = useState(null);

            const fetchData = useCallback(async () => {
                if (!user) return;
                const client = getSupabase();
                if (!client) {
                    console.log("Supabase klijent nije inicijalizovan (fale ključevi).");
                    return;
                }
                setIsLoading(true); setError(null);
                try {
                    const [art, lst, cat] = await Promise.all([
                        client.from('articles').select('*').order('name'),
                        client.from('shopping_lists').select('*').order('created_at', { ascending: false }),
                        client.from('categories').select('*').order('name')
                    ]);
                    setArticles(art.data || []);
                    setLists(lst.data || []);
                    setCategories(cat.data || []);
                } catch (err) { 
                    setError("Povezivanje nije uspelo. Proveri Supabase ključ."); 
                } finally { setIsLoading(false); }
            }, [user]);

            useEffect(() => { if (user) fetchData(); }, [fetchData, user]);

            const openConfirm = (title, message, onConfirm, type = "danger", initialValue = "") => {
                setModal({ isOpen: true, title, message, type, initialValue, onConfirm: (val) => { onConfirm(val); setModal(m => ({...m, isOpen: false})); } });
            };

            if (!user) return (
                <div className="min-h-screen bg-indigo-600 flex flex-col items-center justify-center p-8 text-white text-center">
                    <div className="bg-white/10 p-8 rounded-[3rem] backdrop-blur-md border border-white/20 w-full max-w-sm shadow-2xl">
                        <h1 className="text-4xl font-black mb-2 tracking-tighter uppercase italic text-yellow-300">SPISAK.SHOP</h1>
                        <p className="text-xs font-bold uppercase tracking-widest mb-8 opacity-80">Unesi svoje ime da počneš</p>
                        <input id="login_name" autoFocus className="w-full p-5 rounded-3xl text-slate-900 font-bold mb-4 outline-none border-2 border-transparent focus:border-yellow-300" placeholder="Tvoje ime..." />
                        <button className="w-full bg-yellow-400 text-indigo-900 p-5 rounded-3xl font-black uppercase shadow-xl active:scale-95" onClick={() => {
                            const v = document.getElementById('login_name').value.trim();
                            if(v) { localStorage.setItem('user_name', v); setUser(v); }
                        }}>KRENI!</button>
                    </div>
                </div>
            );

            return (
                <>
                    <Modal isOpen={modal.isOpen} {...modal} onCancel={() => setModal(m => ({...m, isOpen: false}))} />
                    {view === "home" && (
                        <Container subtitle={`Zdravo, ${user}`} loading={isLoading} error={error}>
                            {(!getSupabase()) && (
                                <div className="bg-yellow-50 border-2 border-yellow-200 p-4 rounded-2xl text-yellow-800 text-xs font-bold text-center mb-4">
                                    ⚠️ Aplikacija nije povezana na bazu. <br/> Idi u podešavanja i unesi Supabase ključ.
                                </div>
                            )}
                            <div className="grid grid-cols-1 gap-4 mt-6 animate-in zoom-in-95 duration-300">
                                <button className="menu-btn bg-white border-indigo-100 shadow-sm text-indigo-600" onClick={() => setView("create")}>📝 NOVI SPISAK</button>
                                <button className="menu-btn bg-white border-indigo-100 shadow-sm text-indigo-600" onClick={() => setView("archive")}>📁 ARHIVA SPISKOVA</button>
                                <button className="menu-btn bg-white border-indigo-100 shadow-sm text-indigo-600" onClick={() => setView("articles")}>📦 SVI ARTIKLI</button>
                                <button className="menu-btn bg-white border-indigo-100 shadow-sm text-indigo-600" onClick={() => setView("categories")}>🏷️ KATEGORIJE</button>
                                <button className="menu-btn bg-slate-900 !text-white border-slate-950 mt-8 shadow-2xl active:translate-y-1" onClick={() => setView("settings")}>⚙️ PODEŠAVANJA</button>
                            </div>
                        </Container>
                    )}
                    {view === "settings" && <Container subtitle="Konfiguracija" onBack={() => setView("home")}><SettingsView onRefresh={fetchData} /></Container>}
                    {view === "create" && <Container subtitle="Novi spisak" onBack={() => setView("home")}><CreateView articles={articles} onSave={async (name, items) => { const client = getSupabase(); if(client) { await client.from('shopping_lists').insert([{ name, items, created_by: user }]); fetchData(); setView("archive"); } }} /></Container>}
                    {view === "archive" && (
                        <Container subtitle="Arhiva" onBack={() => setView("home")}>
                            <div className="space-y-3">
                                {lists.length === 0 && <div className="text-center p-12 text-slate-300 font-bold uppercase text-xs">Nema sačuvanih spiskova</div>}
                                {lists.map(l => (
                                    <div key={l.id} className="bg-white p-5 rounded-[2rem] flex items-center justify-between shadow-sm border border-slate-50 active:scale-95 transition-all" onClick={() => { setActiveListId(l.id); setView("viewList"); }}>
                                        <div className="flex-1 px-2">
                                            <h3 className="font-extrabold text-slate-800 uppercase italic leading-none mb-1">{l.name}</h3>
                                            <span className="text-[10px] text-indigo-400 font-black uppercase tracking-tighter">{new Date(l.created_at).toLocaleDateString('sr-RS')} • {l.items?.length || 0} stavki</span>
                                        </div>
                                        <button className="action-btn bg-red-50 text-red-500 border-red-100" onClick={(e) => { e.stopPropagation(); openConfirm("Obriši", "Obrisati spisak?", async () => { if(getSupabase()) { await getSupabase().from('shopping_lists').delete().eq('id', l.id); fetchData(); } }); }}>✕</button>
                                    </div>
                                ))}
                            </div>
                        </Container>
                    )}
                    {view === "viewList" && activeListId && <Container subtitle="Pregled" onBack={() => setView("archive")}><ListView list={lists.find(l => l.id === activeListId)} articles={articles} onUpdate={async (items) => { if(getSupabase()) { await getSupabase().from('shopping_lists').update({ items }).eq('id', activeListId); fetchData(); } }} openConfirm={openConfirm} /></Container>}
                    {view === "articles" && (
                        <Container subtitle="Artikli" onBack={() => setView("home")}>
                             <button className="w-full bg-indigo-600 text-white p-5 rounded-3xl font-black uppercase text-sm mb-4 shadow-lg active:scale-95 transition-all" onClick={() => openConfirm("Novi Artikal", "Naziv:", async (n) => { if(n.trim() && getSupabase()) { await getSupabase().from('articles').insert([{ name: n.trim() }]); fetchData(); } }, "prompt")}>+ DODAJ ARTIKAL</button>
                             <div className="space-y-2">{articles.map(a => (<div key={a.id} className="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm border border-slate-50"><span className="font-bold text-slate-700">{a.name}</span><button className="action-btn bg-red-50 text-red-400 border-red-50" onClick={() => openConfirm("Obriši", "Obrisati artikal?", async () => { if(getSupabase()) { await getSupabase().from('articles').delete().eq('id', a.id); fetchData(); } })}>✕</button></div>))}</div>
                        </Container>
                    )}
                    {view === "categories" && (
                        <Container subtitle="Kategorije" onBack={() => setView("home")}>
                             <button className="w-full bg-indigo-600 text-white p-5 rounded-3xl font-black uppercase text-sm mb-4 shadow-lg active:scale-95 transition-all" onClick={() => openConfirm("Nova Kategorija", "Naziv:", async (n) => { if(n.trim() && getSupabase()) { await getSupabase().from('categories').insert([{ name: n.trim() }]); fetchData(); } }, "prompt")}>+ DODAJ KATEGORIJU</button>
                            <div className="space-y-2">{categories.map(c => (<div key={c.id} className="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm border border-slate-50"><span className="font-bold text-slate-700">{c.name}</span><button className="action-btn bg-red-50 text-red-400 border-red-50" onClick={() => openConfirm("Obriši", "Obrisati kategoriju?", async () => { if(getSupabase()) { await getSupabase().from('categories').delete().eq('id', c.id); fetchData(); } })}>✕</button></div>))}</div>
                        </Container>
                    )}
                </>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

</body></html>
